<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Clad</title>
<meta name="description" content="Clad - Coming Soon">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Outfit', sans-serif;
    background: #040B14;
    color: #F0F4F8;
    -webkit-font-smoothing: antialiased;
  }

  #networkCanvas {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  .vignette {
    position: fixed;
    inset: 0;
    z-index: 2;
    background: radial-gradient(ellipse 70% 70% at 50% 50%, transparent 20%, rgba(4, 11, 20, 0.9) 100%);
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 10;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }

  .logo {
    font-size: clamp(2.8rem, 8vw, 6rem);
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #F0F4F8;
    position: relative;
    animation: logoReveal 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
    transform: translateY(20px);
    text-shadow: 0 0 80px rgba(0, 184, 212, 0.2), 0 0 160px rgba(0, 184, 212, 0.05);
  }

  .logo::after {
    content: '';
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #00B8D4, transparent);
    box-shadow: 0 0 20px rgba(0, 184, 212, 0.6), 0 0 60px rgba(0, 184, 212, 0.2);
    animation: lineExpand 1.2s 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
  }

  @keyframes logoReveal { to { opacity: 1; transform: translateY(0); } }
  @keyframes lineExpand { 0% { width: 0; opacity: 0; } 100% { width: 80px; opacity: 1; } }

  .tagline {
    margin-top: 2.5rem;
    font-size: clamp(0.65rem, 1.6vw, 0.9rem);
    font-weight: 300;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: rgba(138, 155, 181, 0.6);
    animation: fadeUp 1s 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
    transform: translateY(15px);
  }

  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

  .corner {
    position: fixed;
    z-index: 5;
    width: 20px;
    height: 20px;
    border-color: rgba(0, 184, 212, 0.1);
    border-style: solid;
    border-width: 0;
    animation: cornerFade 1s 2.5s forwards;
    opacity: 0;
  }

  .corner--tl { top: 20px; left: 20px; border-top-width: 1px; border-left-width: 1px; }
  .corner--tr { top: 20px; right: 20px; border-top-width: 1px; border-right-width: 1px; }
  .corner--bl { bottom: 20px; left: 20px; border-bottom-width: 1px; border-left-width: 1px; }
  .corner--br { bottom: 20px; right: 20px; border-bottom-width: 1px; border-right-width: 1px; }

  @media (min-width: 768px) {
    .corner { width: 30px; height: 30px; }
    .corner--tl { top: 30px; left: 30px; }
    .corner--tr { top: 30px; right: 30px; }
    .corner--bl { bottom: 30px; left: 30px; }
    .corner--br { bottom: 30px; right: 30px; }
  }

  @keyframes cornerFade { to { opacity: 1; } }
</style>
</head>
<body>

<canvas id="networkCanvas"></canvas>
<div class="vignette"></div>

<div class="corner corner--tl"></div>
<div class="corner corner--tr"></div>
<div class="corner corner--bl"></div>
<div class="corner corner--br"></div>

<div class="content">
  <div class="logo">Clad</div>
  <div class="tagline">Coming Soon</div>
</div>

<script>
const canvas = document.getElementById('networkCanvas');
const ctx = canvas.getContext('2d');

let width, height, nodes, pulses, aurora;
let dpr = Math.min(window.devicePixelRatio || 1, 2);
let isMobile = window.innerWidth < 768;
let NODE_COUNT, CONNECT_DIST, MAX_PULSES, frameSkip;
let frameCount = 0;
let time = 0;

function setConfig() {
  isMobile = window.innerWidth < 768;
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  NODE_COUNT = isMobile ? 40 : 90;
  CONNECT_DIST = isMobile ? 110 : 160;
  MAX_PULSES = isMobile ? 6 : 15;
  frameSkip = isMobile ? 2 : 1;
}

function resize() {
  setConfig();
  width = window.innerWidth;
  height = window.innerHeight;
  canvas.width = width * dpr;
  canvas.height = height * dpr;
  canvas.style.width = width + 'px';
  canvas.style.height = height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function createNodes() {
  nodes = [];
  for (let i = 0; i < NODE_COUNT; i++) {
    const depth = Math.random(); // 0 = far, 1 = near
    nodes.push({
      x: Math.random() * width,
      y: Math.random() * height,
      vx: (Math.random() - 0.5) * (0.15 + depth * 0.2),
      vy: (Math.random() - 0.5) * (0.15 + depth * 0.2),
      radius: 0.8 + depth * 1.8,
      depth: depth,
      pulsePhase: Math.random() * Math.PI * 2,
      type: Math.random() < 0.1 ? 'hub' : 'node',
      ringPhase: Math.random() * Math.PI * 2,
      brightness: 0
    });
  }
  pulses = [];
  aurora = [
    { x: width * 0.2, y: height * 0.3, r: 300, phase: 0, speed: 0.003, color: [0, 184, 212] },
    { x: width * 0.8, y: height * 0.7, r: 250, phase: 2, speed: 0.004, color: [0, 150, 200] },
    { x: width * 0.5, y: height * 0.5, r: 350, phase: 4, speed: 0.002, color: [0, 210, 230] },
  ];
}

function spawnPulse() {
  if (pulses.length >= MAX_PULSES) return;
  const i = Math.floor(Math.random() * nodes.length);
  let closest = -1, closestDist = Infinity;
  for (let j = 0; j < nodes.length; j++) {
    if (i === j) continue;
    const dx = nodes[i].x - nodes[j].x;
    const dy = nodes[i].y - nodes[j].y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < CONNECT_DIST && dist < closestDist) {
      closest = j;
      closestDist = dist;
    }
  }
  if (closest >= 0) {
    pulses.push({ from: i, to: closest, progress: 0, speed: 0.5 + Math.random() * 0.5 });
    nodes[i].brightness = 1;
  }
}

// hub burst: occasionally a hub sends pulses to all neighbors
function hubBurst() {
  const hubs = nodes.filter((n, idx) => n.type === 'hub').map((n, idx) => nodes.indexOf(n));
  if (hubs.length === 0) return;
  const hubIdx = hubs[Math.floor(Math.random() * hubs.length)];
  const hub = nodes[hubIdx];
  hub.brightness = 1.5;
  for (let j = 0; j < nodes.length; j++) {
    if (j === hubIdx) continue;
    const dx = hub.x - nodes[j].x;
    const dy = hub.y - nodes[j].y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < CONNECT_DIST * 1.2 && pulses.length < MAX_PULSES + 5) {
      pulses.push({ from: hubIdx, to: j, progress: 0, speed: 0.8 + Math.random() * 0.3 });
    }
  }
}

function update() {
  time += 0.016;

  for (const node of nodes) {
    node.x += node.vx;
    node.y += node.vy;
    node.pulsePhase += 0.012;
    node.ringPhase += 0.02;
    node.brightness *= 0.96; // fade

    if (node.x < -40) node.vx += 0.01;
    if (node.x > width + 40) node.vx -= 0.01;
    if (node.y < -40) node.vy += 0.01;
    if (node.y > height + 40) node.vy -= 0.01;
    node.vx *= 0.9995;
    node.vy *= 0.9995;
  }

  for (let i = pulses.length - 1; i >= 0; i--) {
    pulses[i].progress += pulses[i].speed * 0.014;
    if (pulses[i].progress > 1) {
      nodes[pulses[i].to].brightness = 0.8;
      pulses.splice(i, 1);
    }
  }

  if (Math.random() < 0.04) spawnPulse();
  if (Math.random() < 0.003) hubBurst();

  // aurora drift
  for (const a of aurora) {
    a.phase += a.speed;
    a.x += Math.sin(a.phase) * 0.5;
    a.y += Math.cos(a.phase * 0.7) * 0.3;
  }
}

function draw() {
  ctx.clearRect(0, 0, width, height);

  // deep background
  ctx.fillStyle = '#040B14';
  ctx.fillRect(0, 0, width, height);

  // aurora blobs
  for (const a of aurora) {
    const intensity = (Math.sin(a.phase) * 0.5 + 0.5) * 0.06;
    const grd = ctx.createRadialGradient(a.x, a.y, 0, a.x, a.y, a.r);
    grd.addColorStop(0, `rgba(${a.color[0]},${a.color[1]},${a.color[2]},${intensity})`);
    grd.addColorStop(0.6, `rgba(${a.color[0]},${a.color[1]},${a.color[2]},${intensity * 0.3})`);
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd;
    ctx.fillRect(a.x - a.r, a.y - a.r, a.r * 2, a.r * 2);
  }

  // connections (depth-sorted - draw far ones first)
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const dx = nodes[i].x - nodes[j].x;
      const dy = nodes[i].y - nodes[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < CONNECT_DIST) {
        const avgDepth = (nodes[i].depth + nodes[j].depth) / 2;
        const proximityAlpha = (1 - dist / CONNECT_DIST);
        const brightBoost = Math.max(nodes[i].brightness, nodes[j].brightness);
        const alpha = proximityAlpha * (0.04 + avgDepth * 0.06 + brightBoost * 0.15);
        ctx.beginPath();
        ctx.moveTo(nodes[i].x, nodes[i].y);
        ctx.lineTo(nodes[j].x, nodes[j].y);
        ctx.strokeStyle = brightBoost > 0.3
          ? `rgba(0,229,255,${alpha})`
          : `rgba(0,184,212,${alpha})`;
        ctx.lineWidth = 0.3 + avgDepth * 0.4;
        ctx.stroke();
      }
    }
  }

  // pulses with trail
  for (const pulse of pulses) {
    const from = nodes[pulse.from];
    const to = nodes[pulse.to];
    const x = from.x + (to.x - from.x) * pulse.progress;
    const y = from.y + (to.y - from.y) * pulse.progress;

    // trail
    const trailLen = 0.15;
    const tx = from.x + (to.x - from.x) * Math.max(0, pulse.progress - trailLen);
    const ty = from.y + (to.y - from.y) * Math.max(0, pulse.progress - trailLen);
    const trailGrd = ctx.createLinearGradient(tx, ty, x, y);
    trailGrd.addColorStop(0, 'rgba(0,229,255,0)');
    trailGrd.addColorStop(1, 'rgba(0,229,255,0.25)');
    ctx.beginPath();
    ctx.moveTo(tx, ty);
    ctx.lineTo(x, y);
    ctx.strokeStyle = trailGrd;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // glow head
    const grd = ctx.createRadialGradient(x, y, 0, x, y, 5);
    grd.addColorStop(0, 'rgba(0,229,255,0.8)');
    grd.addColorStop(0.4, 'rgba(0,184,212,0.3)');
    grd.addColorStop(1, 'rgba(0,184,212,0)');
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();
  }

  // nodes
  for (const node of nodes) {
    const pulse = Math.sin(node.pulsePhase) * 0.3 + 0.7;
    const r = node.type === 'hub' ? node.radius * 1.8 : node.radius;
    const depthAlpha = 0.2 + node.depth * 0.5;
    const bright = node.brightness;

    // hub ring pulse
    if (node.type === 'hub') {
      const ringSize = 8 + Math.sin(node.ringPhase) * 4 + bright * 10;
      const ringAlpha = (0.08 + bright * 0.2) * pulse;
      ctx.beginPath();
      ctx.arc(node.x, node.y, ringSize, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(0,229,255,${ringAlpha})`;
      ctx.lineWidth = 0.5;
      ctx.stroke();

      // hub glow
      const grd = ctx.createRadialGradient(node.x, node.y, 0, node.x, node.y, 15);
      grd.addColorStop(0, `rgba(0,184,212,${(0.1 + bright * 0.15) * pulse})`);
      grd.addColorStop(1, 'rgba(0,184,212,0)');
      ctx.beginPath();
      ctx.arc(node.x, node.y, 15, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();
    }

    // brightness flash
    if (bright > 0.1) {
      const flashGrd = ctx.createRadialGradient(node.x, node.y, 0, node.x, node.y, 8);
      flashGrd.addColorStop(0, `rgba(0,229,255,${bright * 0.4})`);
      flashGrd.addColorStop(1, 'rgba(0,229,255,0)');
      ctx.beginPath();
      ctx.arc(node.x, node.y, 8, 0, Math.PI * 2);
      ctx.fillStyle = flashGrd;
      ctx.fill();
    }

    // dot
    ctx.beginPath();
    ctx.arc(node.x, node.y, r, 0, Math.PI * 2);
    const baseAlpha = depthAlpha * pulse + bright * 0.3;
    ctx.fillStyle = node.type === 'hub'
      ? `rgba(0,229,255,${Math.min(baseAlpha * 0.9, 1)})`
      : `rgba(0,184,212,${Math.min(baseAlpha * 0.6, 1)})`;
    ctx.fill();
  }
}

function animate() {
  frameCount++;
  update();
  if (frameCount % frameSkip === 0) draw();
  requestAnimationFrame(animate);
}

let resizeTimeout;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(() => { resize(); createNodes(); }, 200);
});

resize();
createNodes();
animate();
</script>

</body>
</html>
