<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Clad</title>
<meta name="description" content="Building the future of medical device distribution.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --navy: #0B1A2E;
    --navy-deep: #060F1C;
    --cyan: #00B8D4;
    --cyan-glow: #00E5FF;
    --white: #F0F4F8;
    --gray: #8A9BB5;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Outfit', sans-serif;
    background: var(--navy-deep);
    color: var(--white);
    -webkit-font-smoothing: antialiased;
  }

  #networkCanvas {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  .vignette {
    position: fixed;
    inset: 0;
    z-index: 2;
    background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 30%, rgba(6, 15, 28, 0.85) 100%);
    pointer-events: none;
  }

  /* scanline removed - distracting on mobile */

  .content {
    position: relative;
    z-index: 10;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }

  .logo {
    font-size: clamp(2.8rem, 8vw, 6rem);
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--white);
    position: relative;
    animation: logoReveal 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
    transform: translateY(20px);
    text-shadow: 0 0 60px rgba(0, 184, 212, 0.15);
  }

  .logo::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 2px;
    background: var(--cyan);
    box-shadow: 0 0 20px rgba(0, 184, 212, 0.5), 0 0 40px rgba(0, 184, 212, 0.2);
    animation: lineExpand 1s 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
  }

  @keyframes logoReveal { to { opacity: 1; transform: translateY(0); } }
  @keyframes lineExpand { 0% { width: 0; opacity: 0; } 100% { width: 60px; opacity: 1; } }

  .tagline {
    margin-top: 3rem;
    font-size: clamp(0.7rem, 1.8vw, 1rem);
    font-weight: 300;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gray);
    animation: fadeUp 1s 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
    transform: translateY(15px);
  }

  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

  .corner {
    position: fixed;
    z-index: 5;
    width: 24px;
    height: 24px;
    border-color: rgba(0, 184, 212, 0.15);
    border-style: solid;
    border-width: 0;
    animation: cornerFade 1s 2.5s forwards;
    opacity: 0;
  }

  .corner--tl { top: 20px; left: 20px; border-top-width: 1px; border-left-width: 1px; }
  .corner--tr { top: 20px; right: 20px; border-top-width: 1px; border-right-width: 1px; }
  .corner--bl { bottom: 20px; left: 20px; border-bottom-width: 1px; border-left-width: 1px; }
  .corner--br { bottom: 20px; right: 20px; border-bottom-width: 1px; border-right-width: 1px; }

  @media (min-width: 768px) {
    .corner { width: 30px; height: 30px; }
    .corner--tl { top: 30px; left: 30px; }
    .corner--tr { top: 30px; right: 30px; }
    .corner--bl { bottom: 30px; left: 30px; }
    .corner--br { bottom: 30px; right: 30px; }
  }

  @keyframes cornerFade { to { opacity: 1; } }

  .bottom-label {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.55rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(138, 155, 181, 0.25);
    z-index: 10;
    animation: fadeUp 0.8s 3s forwards;
    opacity: 0;
    white-space: nowrap;
  }

  @media (min-width: 768px) {
    .bottom-label { bottom: 30px; font-size: 0.65rem; letter-spacing: 0.3em; }
  }
</style>
</head>
<body>

<canvas id="networkCanvas"></canvas>
<div class="vignette"></div>

<div class="corner corner--tl"></div>
<div class="corner corner--tr"></div>
<div class="corner corner--bl"></div>
<div class="corner corner--br"></div>

<div class="content">
  <div class="logo">Clad</div>
  <div class="tagline">Coming Soon</div>
</div>

<div class="bottom-label">Distribution Health Technologies, Inc.</div>

<script>
const canvas = document.getElementById('networkCanvas');
const ctx = canvas.getContext('2d');

let width, height, nodes, pulses;
let dpr = Math.min(window.devicePixelRatio || 1, 2);
let isMobile = window.innerWidth < 768;
let NODE_COUNT = isMobile ? 35 : 80;
let CONNECT_DIST = isMobile ? 120 : 180;
let MAX_PULSES = isMobile ? 5 : 12;
let frameSkip = isMobile ? 2 : 1;
let frameCount = 0;

function resize() {
  isMobile = window.innerWidth < 768;
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  NODE_COUNT = isMobile ? 35 : 80;
  CONNECT_DIST = isMobile ? 120 : 180;
  MAX_PULSES = isMobile ? 5 : 12;
  frameSkip = isMobile ? 2 : 1;

  width = window.innerWidth;
  height = window.innerHeight;
  canvas.width = width * dpr;
  canvas.height = height * dpr;
  canvas.style.width = width + 'px';
  canvas.style.height = height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function createNodes() {
  nodes = [];
  for (let i = 0; i < NODE_COUNT; i++) {
    nodes.push({
      x: Math.random() * width,
      y: Math.random() * height,
      vx: (Math.random() - 0.5) * 0.25,
      vy: (Math.random() - 0.5) * 0.25,
      radius: 1.2 + Math.random() * 1.3,
      pulsePhase: Math.random() * Math.PI * 2,
      type: Math.random() < 0.12 ? 'hub' : 'node'
    });
  }
  pulses = [];
}

function spawnPulse() {
  if (pulses.length >= MAX_PULSES) return;
  const i = Math.floor(Math.random() * nodes.length);
  for (let j = 0; j < nodes.length; j++) {
    if (i === j) continue;
    const dx = nodes[i].x - nodes[j].x;
    const dy = nodes[i].y - nodes[j].y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < CONNECT_DIST) {
      pulses.push({ from: i, to: j, progress: 0, speed: 0.6 + Math.random() * 0.4 });
      return;
    }
  }
}

function update() {
  for (const node of nodes) {
    node.x += node.vx;
    node.y += node.vy;
    node.pulsePhase += 0.015;

    if (node.x < -30) node.vx += 0.015;
    if (node.x > width + 30) node.vx -= 0.015;
    if (node.y < -30) node.vy += 0.015;
    if (node.y > height + 30) node.vy -= 0.015;
    node.vx *= 0.999;
    node.vy *= 0.999;
  }

  for (let i = pulses.length - 1; i >= 0; i--) {
    pulses[i].progress += pulses[i].speed * 0.012;
    if (pulses[i].progress > 1) pulses.splice(i, 1);
  }

  if (Math.random() < 0.03) spawnPulse();
}

function draw() {
  ctx.clearRect(0, 0, width, height);
  ctx.fillStyle = '#060F1C';
  ctx.fillRect(0, 0, width, height);

  // connections
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const dx = nodes[i].x - nodes[j].x;
      const dy = nodes[i].y - nodes[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < CONNECT_DIST) {
        const alpha = (1 - dist / CONNECT_DIST) * 0.1;
        ctx.beginPath();
        ctx.moveTo(nodes[i].x, nodes[i].y);
        ctx.lineTo(nodes[j].x, nodes[j].y);
        ctx.strokeStyle = `rgba(0,184,212,${alpha})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }

  // pulses
  for (const pulse of pulses) {
    const from = nodes[pulse.from];
    const to = nodes[pulse.to];
    const x = from.x + (to.x - from.x) * pulse.progress;
    const y = from.y + (to.y - from.y) * pulse.progress;

    const grd = ctx.createRadialGradient(x, y, 0, x, y, 6);
    grd.addColorStop(0, 'rgba(0,229,255,0.7)');
    grd.addColorStop(0.5, 'rgba(0,184,212,0.2)');
    grd.addColorStop(1, 'rgba(0,184,212,0)');
    ctx.beginPath();
    ctx.arc(x, y, 6, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(x, y, 1.2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,229,255,0.8)';
    ctx.fill();
  }

  // nodes
  for (const node of nodes) {
    const pulse = Math.sin(node.pulsePhase) * 0.3 + 0.7;
    const r = node.type === 'hub' ? node.radius * 1.6 : node.radius;

    if (node.type === 'hub') {
      const grd = ctx.createRadialGradient(node.x, node.y, 0, node.x, node.y, 10);
      grd.addColorStop(0, `rgba(0,184,212,${0.12 * pulse})`);
      grd.addColorStop(1, 'rgba(0,184,212,0)');
      ctx.beginPath();
      ctx.arc(node.x, node.y, 10, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();
    }

    ctx.beginPath();
    ctx.arc(node.x, node.y, r, 0, Math.PI * 2);
    ctx.fillStyle = node.type === 'hub'
      ? `rgba(0,229,255,${0.6 * pulse})`
      : `rgba(0,184,212,${0.35 * pulse})`;
    ctx.fill();
  }
}

function animate() {
  frameCount++;
  update();
  if (frameCount % frameSkip === 0) draw();
  requestAnimationFrame(animate);
}

let resizeTimeout;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(() => {
    resize();
    createNodes();
  }, 200);
});

resize();
createNodes();
animate();
</script>

</body>
</html>
